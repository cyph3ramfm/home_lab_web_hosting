- name: Show Homepage URL
  ansible.builtin.debug:
    msg:
      - "Your Home Lab Dashboard will be available at https://{{ homepage_domain_prefix }}.{{ vault_domain }} once you configure Pi-hole to be your primary DNS make sure to add this URL to your Pi-hole Local DNS list."
      - "Be sure to bookmark this URL for easy access."
      - "To configure Pi-hole you can access it through http://{{ ansible_default_ipv4.address }}:10000/admin (for the Pi-hole server deployed as part of this repository)."
